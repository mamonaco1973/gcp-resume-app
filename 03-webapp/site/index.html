<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Scoring Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="css/styles.css">

  <script type="importmap">
  {
    "imports": {
      "firebase/app":  "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js"
    }
  }
  </script>
</head>

<body>

  <!-- ================================================================ -->
  <!-- Header -->
  <!-- ================================================================ -->

  <header class="app-header">
    <h1>Job Scoring Dashboard</h1>

    <div class="actions">
      <span id="auto-refresh-indicator" class="hidden">
        <span class="spinner"></span>
        <span id="auto-refresh-text"></span>
      </span>
      <button id="btn-refresh" type="button" class="icon-btn" title="Refresh"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
      <button id="btn-new-job" class="icon-btn" title="Score New Job"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></button>
      <button id="btn-manage-resumes" class="icon-btn" title="Manage Resumes"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></button>
<button id="btn-sign-out" type="button" class="hidden icon-btn" title="Sign Out"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </header>

  <!-- ================================================================ -->
  <!-- Filter Bar -->
  <!-- ================================================================ -->

  <div id="filter-bar" class="filter-bar hidden">
    <div class="filter-group">
      <label for="folder-select">Folder</label>
      <div class="filter-group-row">
        <select id="folder-select">
          <option value="">All Jobs</option>
        </select>
        <button type="button" id="btn-new-folder" class="icon-btn" title="New Folder"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg></button>
        <button type="button" id="btn-delete-folder" class="danger hidden icon-btn" title="Delete Folder"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="9" y1="14" x2="15" y2="14"/></svg></button>
      </div>
    </div>
    <div class="filter-group">
      <label for="filter-status">Status</label>
      <div class="filter-group-row">
        <select id="filter-status">
          <option value="">All</option>
          <option value="submitted">Submitted</option>
          <option value="Scoring">Scoring</option>
          <option value="Scored">Scored</option>
          <option value="Error">Error</option>
        </select>
      </div>
    </div>
    <div class="filter-group filter-group--search">
      <label for="filter-search">Search</label>
      <div class="filter-group-row">
        <input
          type="text"
          id="filter-search"
          placeholder="Title or company..."
        >
      </div>
    </div>
  </div>

  <!-- ================================================================ -->
  <!-- Jobs Table -->
  <!-- ================================================================ -->

  <main>

    <table id="jobs-table">
      <thead>
        <tr>
          <th class="checkbox-cell">
            <input type="checkbox" id="select-all-jobs">
          </th>
          <th data-sort="job_title">Job Title</th>
          <th data-sort="company">Company</th>
          <th data-sort="status">Status</th>
          <th data-sort="score">Score</th>
          <th data-sort="created_at">Date</th>
        </tr>
      </thead>

      <tbody id="jobs-body">
        <!-- rows rendered by jobs.js -->
      </tbody>

    </table>

    <!-- ============================================================ -->
    <!-- Bulk Action Bar (visible when rows are selected)             -->
    <!-- ============================================================ -->

    <div id="bulk-action-bar" class="bulk-action-bar hidden">
      <span id="bulk-count"></span>
      <button type="button" id="btn-bulk-delete" class="danger icon-btn" title="Delete Selected"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
      <div class="bulk-move-group">
        <span>Move to</span>
        <select id="bulk-folder-select">
          <option value="">— Unassigned —</option>
        </select>
        <button type="button" id="btn-bulk-move" class="icon-btn" title="Move to Folder"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
      </div>
    </div>

    <div id="empty-state" class="hidden">
      <p>No jobs submitted yet.</p>
      <p>Click <b>Score New Job</b> to begin.</p>
    </div>

  </main>

<!-- ================================================================ -->
<!-- New Job Modal -->
<!-- ================================================================ -->

<div id="new-job-modal" class="modal hidden">

  <div class="modal-content">

    <h2>Score New Job</h2>

    <form id="new-job-form">

      <label>Resume</label>
      <select id="resume-select"></select>
      <div id="resume-error" class="field-error hidden"></div>

      <label>Folder (optional)</label>
      <select id="new-job-folder-select">
        <option value="">No Folder</option>
      </select>

      <label>Source Type</label>
      <select id="source-type">
        <option value="url">Job URL</option>
        <option value="raw_text">Paste Job Description</option>
        <option value="linkedin_job_id">LinkedIn Job IDs</option>
      </select>

      <div id="url-field">
        <label>Job URL</label>
        <input type="text" id="job-url">
        <div id="job-url-error" class="field-error hidden"></div>
      </div>

      <div id="text-field" class="hidden">
        <label>Job Description</label>
        <textarea id="job-description"></textarea>
        <div id="job-description-error" class="field-error hidden"></div>
      </div>

      <div id="linkedin-field" class="hidden">
        <label>LinkedIn Job ID(s)</label>
        <textarea
          id="linkedin-job-ids"
          placeholder="Enter one or more LinkedIn job IDs&#10;Example:&#10;1234567890&#10;9876543210"
        ></textarea>
        <div id="linkedin-job-ids-error" class="field-error hidden"></div>
      </div>

      <div class="modal-actions">
        <button type="submit" id="submit-new-job">Submit</button>
        <button type="button" id="cancel-new-job">Cancel</button>
      </div>

    </form>

  </div>

</div>

  <!-- ================================================================ -->
  <!-- Resume Manager Modal -->
  <!-- ================================================================ -->

  <div id="resume-modal" class="modal hidden">

    <div class="modal-content resume-modal-content">

      <h2>Manage Resumes</h2>

      <div class="resume-manager">

        <div class="resume-sidebar">

          <div class="resume-sidebar-actions">
            <button type="button" id="btn-new-resume" class="icon-btn" title="New Resume"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          </div>

          <div id="resume-list"></div>

        </div>

        <div class="resume-editor">

          <h3 id="resume-form-title">Create Resume</h3>

          <form id="resume-form">

            <label>Resume Name</label>
            <input type="text" id="resume-name">

            <label>Resume Text</label>
            <textarea id="resume-text"></textarea>

            <div class="modal-actions">
              <button type="submit" id="save-resume-btn">
                Create Resume
              </button>
              <button
                type="button"
                id="delete-resume-btn"
                class="danger hidden"
              >
                Delete
              </button>
              <button type="button" id="close-resume-modal">Close</button>
            </div>

          </form>

        </div>

      </div>

    </div>

  </div>

  <!-- ================================================================ -->
  <!-- Auth Modal -->
  <!-- ================================================================ -->

  <div id="auth-modal" class="modal hidden">

    <div class="modal-content">

      <h2 id="auth-modal-title">Sign In</h2>

      <form id="auth-form">

        <label for="auth-email">Email</label>
        <input
          type="email"
          id="auth-email"
          autocomplete="email"
          required
        >

        <label for="auth-password">Password</label>
        <input
          type="password"
          id="auth-password"
          autocomplete="current-password"
          required
        >

        <div id="auth-error" class="field-error hidden"></div>

        <div class="modal-actions">
          <button type="submit" id="btn-auth-submit">Sign In</button>
          <button type="button" id="btn-auth-toggle">Create Account</button>
        </div>

      </form>

    </div>

  </div>

  <!-- ================================================================ -->
  <!-- Load Application -->
  <!-- ================================================================ -->

  <script type="module" src="js/app.js"></script>

</body>
</html>
